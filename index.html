<html lang="es">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
        body{font-family:'Arial',sans-serif;background:#0A2E1A;color:#fff}
        header{background:#000;padding:15px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;border-bottom:3px solid #D4AF37}
        .logo{display:flex;align-items:center;gap:10px}

        nav{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
        nav a{color:#fff;text-decoration:none;font-weight:bold;font-size:14px;cursor:pointer;transition:0.3s}
        nav a:hover{color:#D4AF37}
        #cartBtn{background:#D4AF37;color:#000;border:none;padding:10px 20px;font-weight:bold;cursor:pointer;border-radius:5px}

        .btn:hover{background:#fff;transform:translateY(-3px);box-shadow:0 8px 30px rgba(212,175,55,0.7)}
        .btn-small{padding:12px 25px;font-size:14px;margin-top:15px}
        section{padding:100px 5%;max-width:1400px;margin:auto;background:#0A2E1A}

        .gold-text{color:#D4AF37}
        .nosotros-grid{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center}

        .catalogo-content{display:none;padding:35px 0}

        .catalogo-content img{width:100%;max-width:650px;margin:25px 0;border:4px solid #D4AF37;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
